<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" role="img" aria-label="Riley — Your Daily Life Hub">
  <defs>
    <!-- Remove white background + colorize to golden -->
    <filter id="makeGold" color-interpolation-filters="sRGB" x="0%" y="0%" width="100%" height="100%">
      <!-- Step 1: invert so black lines become white, white bg becomes black -->
      <feComponentTransfer result="inverted">
        <feFuncR type="linear" slope="-1" intercept="1"/>
        <feFuncG type="linear" slope="-1" intercept="1"/>
        <feFuncB type="linear" slope="-1" intercept="1"/>
      </feComponentTransfer>
      <!-- Step 2: use the luminance as alpha (white lines = opaque, black bg = transparent) -->
      <feColorMatrix type="matrix" result="alphaFromLuma"
        values="0 0 0 0 0.933
                0 0 0 0 0.627
                0 0 0 0 0.094
                0.2126 0.7152 0.0722 0 0"/>
      <!-- Step 3: flood the golden colour -->
      <feFlood flood-color="#E8A018" result="goldFlood"/>
      <!-- Step 4: apply alpha mask so only the dog lines show in gold -->
      <feComposite in="goldFlood" in2="alphaFromLuma" operator="in"/>
    </filter>

    <!-- Soft drop shadow for badge -->
    <filter id="badgeShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- ── GREEN CIRCLE BADGE ────────────────────────── -->
  <circle cx="90" cy="90" r="88" fill="#1a5c38" filter="url(#badgeShadow)"/>
  <!-- Subtle inner glow ring -->
  <circle cx="90" cy="90" r="83" fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="2"/>

  <!-- ── DOG IMAGE — white bg removed, rendered gold ─ -->
  <!--  Clip to circle so it stays inside the badge     -->
  <clipPath id="badgeClip">
    <circle cx="90" cy="90" r="83"/>
  </clipPath>
  <image
    href="DOGLOGO.png"
    x="5" y="8"
    width="170" height="164"
    clip-path="url(#badgeClip)"
    filter="url(#makeGold)"
    image-rendering="crisp-edges"/>

  <!-- ── WORDMARK ───────────────────────────────────── -->
  <!-- "Riley" in brand green -->
  <text x="202" y="86"
        font-family="'Atkinson Hyperlegible', 'Segoe UI', Arial, sans-serif"
        font-size="74"
        font-weight="700"
        fill="#1a5c38"
        letter-spacing="-1.5">Riley</text>

  <!-- Tagline -->
  <text x="206" y="116"
        font-family="'Atkinson Hyperlegible', 'Segoe UI', Arial, sans-serif"
        font-size="19"
        font-weight="400"
        fill="#557055"
        letter-spacing="0.6">Your Daily Life Hub</text>

  <!-- Green underline accent -->
  <rect x="206" y="125" width="300" height="3.5" rx="1.75" fill="#c8e6ce"/>

  <!-- Paw print flourish -->
  <g transform="translate(468,100)" opacity="0.3" fill="#1a5c38">
    <ellipse cx="0"  cy="0"  rx="5.5" ry="6"/>
    <ellipse cx="-9" cy="-7" rx="3.5" ry="3"/>
    <ellipse cx="0"  cy="-9" rx="3.5" ry="3"/>
    <ellipse cx="9"  cy="-7" rx="3.5" ry="3"/>
  </g>
</svg>

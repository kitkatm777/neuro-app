<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" role="img" aria-label="Riley logo">
  <defs>
    <!-- Golden coat gradient -->
    <radialGradient id="coatGrad" cx="45%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#F5C040"/>
      <stop offset="55%"  stop-color="#E29018"/>
      <stop offset="100%" stop-color="#C07010"/>
    </radialGradient>
    <!-- Ear gradient -->
    <radialGradient id="earGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#D4880E"/>
      <stop offset="100%" stop-color="#9A5808"/>
    </radialGradient>
    <!-- Muzzle gradient -->
    <radialGradient id="muzzleGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#F5C848"/>
      <stop offset="100%" stop-color="#E0A020"/>
    </radialGradient>
    <!-- Badge drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000028"/>
    </filter>
  </defs>

  <!-- ═══ BADGE CIRCLE ═══════════════════════════════════ -->
  <circle cx="50" cy="50" r="48" fill="#1a5c38" filter="url(#shadow)"/>
  <!-- Subtle inner ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- ═══ LEFT EAR ════════════════════════════════════════ -->
  <path d="M 18 38
           C 10 42, 7 55, 9 68
           C 11 78, 19 82, 24 74
           C 28 67, 26 52, 24 40 Z"
        fill="url(#earGrad)"/>
  <!-- Ear inner sheen -->
  <path d="M 19 44 C 15 52, 14 62, 16 70 C 17 74, 21 76, 22 72 C 23 66, 22 55, 21 46 Z"
        fill="#C07010" opacity="0.4"/>

  <!-- ═══ RIGHT EAR ═══════════════════════════════════════ -->
  <path d="M 82 38
           C 90 42, 93 55, 91 68
           C 89 78, 81 82, 76 74
           C 72 67, 74 52, 76 40 Z"
        fill="url(#earGrad)"/>
  <path d="M 81 44 C 85 52, 86 62, 84 70 C 83 74, 79 76, 78 72 C 77 66, 78 55, 79 46 Z"
        fill="#C07010" opacity="0.4"/>

  <!-- ═══ HEAD ════════════════════════════════════════════ -->
  <ellipse cx="50" cy="46" rx="29" ry="27" fill="url(#coatGrad)"/>

  <!-- Forehead highlight -->
  <ellipse cx="50" cy="33" rx="14" ry="7" fill="#F8D060" opacity="0.45"/>

  <!-- ═══ MUZZLE ═══════════════════════════════════════════ -->
  <ellipse cx="50" cy="62" rx="18" ry="14" fill="url(#muzzleGrad)"/>
  <!-- Muzzle centre divide -->
  <path d="M 50 55 L 50 64" stroke="#C88010" stroke-width="1" stroke-linecap="round" opacity="0.4"/>

  <!-- ═══ NOSE ════════════════════════════════════════════ -->
  <ellipse cx="50" cy="56" rx="9.5" ry="6.5" fill="#1A0800"/>
  <!-- Nose highlight -->
  <ellipse cx="46.5" cy="53.5" rx="3" ry="2" fill="#3A2010" opacity="0.55"/>
  <ellipse cx="47.5" cy="54" rx="1.2" ry="0.8" fill="rgba(255,255,255,0.22)"/>

  <!-- ═══ LEFT EYE ════════════════════════════════════════ -->
  <circle cx="36" cy="42" r="6.5" fill="#1A0800"/>
  <!-- Iris -->
  <circle cx="36" cy="42" r="4.5" fill="#3D1800"/>
  <!-- Pupil -->
  <circle cx="36" cy="42" r="3"   fill="#1A0800"/>
  <!-- Shine -->
  <circle cx="38.2" cy="39.8" r="2.2" fill="white"/>
  <circle cx="34.2" cy="44.5" r="0.9" fill="rgba(255,255,255,0.4)"/>

  <!-- ═══ RIGHT EYE ═══════════════════════════════════════ -->
  <circle cx="64" cy="42" r="6.5" fill="#1A0800"/>
  <circle cx="64" cy="42" r="4.5" fill="#3D1800"/>
  <circle cx="64" cy="42" r="3"   fill="#1A0800"/>
  <circle cx="66.2" cy="39.8" r="2.2" fill="white"/>
  <circle cx="62.2" cy="44.5" r="0.9" fill="rgba(255,255,255,0.4)"/>

  <!-- Eyebrow-like fur tufts -->
  <path d="M 30 36 Q 36 33 42 36" stroke="#C07010" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 58 36 Q 64 33 70 36" stroke="#C07010" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- ═══ SMILE ════════════════════════════════════════════ -->
  <path d="M 39 70 Q 50 80 61 70" stroke="#1A0800" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- ═══ TONGUE ═══════════════════════════════════════════ -->
  <ellipse cx="50" cy="77.5" rx="7.5" ry="6" fill="#E05878"/>
  <!-- Tongue centre crease -->
  <path d="M 50 71 L 50 83.5" stroke="#C03860" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
  <!-- Tongue highlight -->
  <ellipse cx="47" cy="74" rx="2.5" ry="2" fill="rgba(255,255,255,0.25)"/>

  <!-- White collar hint at bottom of badge -->
  <path d="M 18 84 Q 50 96 82 84" stroke="rgba(255,255,255,0.18)" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- ═══ WORDMARK ══════════════════════════════════════════ -->
  <!-- "Riley" lettering -->
  <text x="116" y="62"
        font-family="'Atkinson Hyperlegible', 'Segoe UI', Arial, sans-serif"
        font-size="54"
        font-weight="700"
        fill="#1a5c38"
        letter-spacing="-1">Riley</text>

  <!-- Tagline -->
  <text x="119" y="82"
        font-family="'Atkinson Hyperlegible', 'Segoe UI', Arial, sans-serif"
        font-size="16"
        font-weight="400"
        fill="#557055"
        letter-spacing="0.5">Your Daily Life Hub</text>

  <!-- Decorative underline accent -->
  <rect x="119" y="88" width="228" height="2.5" rx="1.25" fill="#c8e6ce"/>
</svg>
